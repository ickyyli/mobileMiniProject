name: kindisync
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase dependencies (Telah diselaraskan versinya)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6

  # Pakej Tambahan untuk Membaiki Ralat
  intl: ^0.19.0           # Membaiki ralat DateFormat
  image_picker: ^1.1.2    # Membaiki ralat ImagePicker/ImageSource

  # Pakej QR
  qr_flutter: ^4.1.0

  flutter_lints: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  # Jika anda ada folder assets/images, un-comment bahagian di bawah:
  # assets:
  #   - assets/images/